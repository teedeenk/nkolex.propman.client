name: Deploy Angular to DigitalOcean Droplet

on:
  push:
    branches:
      - master # Trigger on pushes to main branch
  workflow_dispatch: # Allow manual runs

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build Angular app
      - name: Build Angular app
        run: ng build --configuration production

      - name: Debug - Check build output
        run: |
          echo "=== Listing dist contents ==="
          ls -la /home/runner/work/nkolex.propman.client/nkolex.propman.client/dist/nkolex.propman.client/
          echo ""
          echo "=== Checking for production flag ==="
          grep -r "production" /home/runner/work/nkolex.propman.client/nkolex.propman.client/dist/nkolex.propman.client/ | head -5
          echo ""
          echo "=== Checking for localhost ==="
          grep -r "localhost" /home/runner/work/nkolex.propman.client/nkolex.propman.client/dist/nkolex.propman.client/ | head -5
          echo ""
          echo "=== Checking environment files ==="
          cat src/environments/environment.prod.ts

      # 5️⃣ Deploy via SSH using rsync
      - name: Deploy to Droplet via rsync
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -avzr --delete
          path: dist/nkolex.propman.client/ # 👈 replace with your Angular output folder
          remote_path: /var/www/html/frontend/propmanclient # 👈 or wherever your Nginx serves files from
          remote_host: ${{ secrets.DO_HOST }}
          remote_user: ${{ secrets.DO_USER }}
          remote_key: ${{ secrets.DO_KEY }}

      # 6️⃣ Restart Nginx (optional)
      - name: Restart Nginx
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_KEY }}
          script: |
            sudo systemctl restart nginx
            echo "Nginx restarted successfully"

name: Deploy Angular to DigitalOcean Droplet

on:
  push:
    branches:
      - master # Trigger on pushes to main branch
  workflow_dispatch: # Allow manual runs

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build Angular app
      - name: Build Angular app
        run: npm run build -- --configuration production

      # 5️⃣ Deploy via SSH using rsync
      - name: Deploy to Droplet via rsync
        uses: burnett01/rsync-deployments@v5.2
        with:
          switches: -avzr --delete
          path: dist/<your-app-name>/ # 👈 replace with your Angular output folder
          remote_path: /var/www/html # 👈 or wherever your Nginx serves files from
          remote_host: ${{ secrets.DROPLET_HOST }}
          remote_user: ${{ secrets.DROPLET_USER }}
          remote_key: ${{ secrets.DROPLET_SSH_KEY }}

      # 6️⃣ Restart Nginx (optional)
      - name: Restart Nginx
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            sudo systemctl restart nginx
            echo "Nginx restarted successfully"
